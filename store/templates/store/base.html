<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}PYRO Store{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0F0F13;
            --bg-surface: #1A1A20;
            --text-primary: #F4F4F5;
            --text-secondary: #A1A1AA;
            --accent-neon: #FF3366; 
            --accent-hover: #ff1a53;
            --border-color: #27272A;
            --font-heading: 'Space Grotesk', sans-serif;
            --font-body: 'Inter', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            font-family: var(--font-body);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        h1, h2, h3, h4 { font-family: var(--font-heading); font-weight: 700; color: var(--text-primary); }
        a { color: var(--accent-neon); text-decoration: none; transition: color 0.3s ease; }
        a:hover { color: var(--accent-hover); }
        button, .btn { font-family: var(--font-body); cursor: pointer; border: none; background: none; }

        .container { max-width: 1200px; margin: 0 auto; padding: 0 1rem; }
        
        .navbar {
            display: flex; justify-content: space-between; align-items: center; 
            padding: 1.5rem 0; border-bottom: 1px solid var(--border-color);
            margin-bottom: 3rem;
        }
        
        .navbar .brand { font-family: var(--font-heading); font-size: 1.5rem; letter-spacing: 2px; text-transform: uppercase; color: var(--text-primary); }
        .nav-links { display: flex; gap: 2rem; align-items: center; }

        .btn {
            display: inline-flex; align-items: center; justify-content: center;
            padding: 0.75rem 1.5rem; font-weight: 600; border-radius: 4px; transition: all 0.3s ease; text-decoration: none;
        }
        .btn-primary { background-color: var(--accent-neon); color: #fff; }
        .btn-primary:hover { background-color: var(--accent-hover); transform: translateY(-2px); }
        .btn-secondary { background-color: var(--bg-surface); color: var(--text-primary); border: 1px solid var(--border-color); }
        .btn-secondary:hover { border-color: var(--text-secondary); }

        .card {
            background-color: var(--bg-surface); border: 1px solid var(--border-color);
            border-radius: 8px; padding: 1.5rem; transition: transform 0.3s ease;
        }
        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.2); }

        .messages { list-style: none; margin-bottom: 2rem; }
        .messages li { padding: 1rem; border-radius: 4px; margin-bottom: 0.5rem; background: var(--bg-surface); border-left: 4px solid var(--accent-neon); }

        /* Helpers */
        .text-secondary { color: var(--text-secondary); }
        .mt-1 { margin-top: 0.5rem; } .mt-2 { margin-top: 1rem; } .mt-4 { margin-top: 2rem; }
        .mb-2 { margin-bottom: 1rem; } .mb-4 { margin-bottom: 2rem; }
        .flex { display: flex; } .justify-between { justify-content: space-between; } .items-center { align-items: center; }
        .gap-1 { gap: 1rem; } .gap-2 { gap: 2rem; }
    </style>
</head>
<body>

<div class="container">
    <nav class="navbar">
        <a href="{% url 'storefront' %}" class="brand">PYRO</a>
        
        <div class="nav-links">
            <span class="text-secondary">Current View: <strong>{{ request.session.role|default:"RETAIL" }}</strong></span>
            <a href="{% url 'toggle_role' %}" class="btn btn-secondary">Toggle Role</a>
            <a href="{% url 'cart_view' %}" class="btn btn-primary">Cart</a>
        </div>
    </nav>

    {% if messages %}
    <ul class="messages">
        {% for message in messages %}
        <li{% if message.tags %} class="{{ message.tags }}"{% endif %}>{{ message }}</li>
        {% endfor %}
    </ul>
    {% endif %}

    {% block content %}
    {% endblock %}
</div>

</body>
</html>
